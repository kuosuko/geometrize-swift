name: GeometrizeDemo
options:
  bundleIdPrefix: com.example.geometrize
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  Geometrize:
    path: ..

targets:
  GeometrizeDemo:
    type: application
    platform: iOS
    sources:
      - path: GeometrizeDemo
    resources:
      - GeometrizeDemo/Assets.xcassets
    dependencies:
      - package: Geometrize
        product: Geometrize
    info:
      path: GeometrizeDemo/Info.plist
      properties:
        UILaunchScreen: {}
        LSRequiresIPhoneOS: true
        NSPhotoLibraryUsageDescription: "Pick an image to recreate as geometric shapes."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        # Replace these two with your own Apple developer team + a unique bundle ID before running on a device.
        PRODUCT_BUNDLE_IDENTIFIER: com.example.geometrize.demo
        DEVELOPMENT_TEAM: ""
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        ENABLE_PREVIEWS: YES
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
