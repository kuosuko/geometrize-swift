name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: swift test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build -c release
      - name: Test
        run: swift test --parallel

  ios-build:
    name: Build for iOS
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Resolve SDK paths
        id: sdk
        run: echo "ios_sdk=$(xcrun --sdk iphonesimulator --show-sdk-path)" >> "$GITHUB_OUTPUT"
      - name: Build library for iOS Simulator
        run: |
          swift build -c release \
            -Xswiftc "-sdk" -Xswiftc "${{ steps.sdk.outputs.ios_sdk }}" \
            -Xswiftc "-target" -Xswiftc "arm64-apple-ios17.0-simulator"
