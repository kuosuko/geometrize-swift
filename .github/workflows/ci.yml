name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: swift test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build -c release
      - name: Test
        run: swift test --parallel

  ios-build:
    name: Build for iOS Simulator
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: List iOS Simulators
        run: xcrun simctl list runtimes
      - name: Build library for iOS Simulator
        run: |
          # xcodebuild handles SPM packages directly via the auto-generated scheme.
          # This avoids the SDK/header confusion `swift build -sdk iphonesimulator` runs into.
          xcodebuild build \
            -scheme Geometrize \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath .build-ios \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true
          # Surface non-zero exit even when piped through xcpretty.
          test -d .build-ios/Build/Products/Debug-iphonesimulator
